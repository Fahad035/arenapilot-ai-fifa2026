name: ArenaPilot AI CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:

  frontend:

    name: Frontend Build & Tests

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Unit Tests
        run: npm test -- --run

      - name: Generate Coverage Report
        run: npm run test:coverage

      - name: Build Frontend
        run: npm run build

  backend:

    name: Backend Tests

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Backend Tests
        run: npm test

  e2e:

    name: End-to-End Tests (Playwright)

    runs-on: ubuntu-latest

    needs:
      - frontend
      - backend

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start Backend (mock AI mode)
        working-directory: backend
        run: nohup npm start &
        env:
          PORT: 5000
          USE_MOCK_AI: "true"
          ALLOWED_ORIGINS: http://localhost:5173

      - name: Wait for Backend
        run: npx wait-on http://localhost:5000 --timeout 30000

      - name: Run Playwright Tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          # Frontend has no dev-server proxy for /api, so point it straight
          # at the backend. Backend CORS defaults already allow this origin.
          VITE_API_URL: http://localhost:5000/api

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
